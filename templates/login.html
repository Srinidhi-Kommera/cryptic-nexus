<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptic Nexus - Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<canvas id="matrix-canvas" class="matrix-canvas"></canvas>
<div class="background-overlay"></div>

<div class="auth-wrap">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <span class="auth-logo-text">CRYPTIC NEXUS</span>
      <p class="auth-subtitle">decode.decrypt.dominate</p>
    </div>

    <div class="terminal-card" style="margin-bottom:22px;">
      <span class="terminal-line"><span class="prompt">team@nexus:$</span> <span class="signal">Identity request received</span></span>
      <span class="terminal-line"><span class="prompt">team@nexus:$</span> Authentication tunnel is ready</span>
      <span class="terminal-line"><span class="prompt">team@nexus:$</span> Enter your team credentials to initialize the game</span>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/">
      <div class="form-group">
        <label class="form-label">Team ID</label>
        <input class="form-input" type="text" id="team_id" name="team_id" placeholder="TEAM01" autocomplete="off" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="password" name="password" placeholder="Enter secret key" required>
          <button type="button" class="pwd-toggle" onclick="togglePwd('password', this)">show</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Initialize Session</button>
    </form>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
