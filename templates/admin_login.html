<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Cryptic Nexus</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<canvas id="matrix-canvas" class="matrix-canvas"></canvas>
<div class="background-overlay"></div>

<div class="auth-wrap">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <span class="auth-logo-text">CRYPTIC NEXUS</span>
      <p class="auth-subtitle">admin.authentication.layer</p>
    </div>

    <div class="terminal-card" style="margin-bottom:22px;">
      <span class="terminal-line"><span class="prompt">root@nexus:$</span> Elevated access requested</span>
      <span class="terminal-line"><span class="prompt">root@nexus:$</span> Control panel locked behind admin credentials</span>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" name="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="pw" name="password" placeholder="Enter admin key" required>
          <button type="button" class="pwd-toggle" onclick="togglePwd('pw', this)">show</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Unlock Admin Console</button>
    </form>

    <p class="mono" style="text-align:center;margin-top:18px;font-size:0.78rem;">
      <a href="/">Back to team login</a>
    </p>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
